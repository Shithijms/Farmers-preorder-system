<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmers' Market Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding-top: 30px; }
        .card { box-shadow: 0 4px 8px rgba(0,0,0,0.05); border: none; margin-bottom: 20px; }
        .out-of-stock { opacity: 0.6; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="text-center mb-4 text-success fw-bold">🌾 Farmers' Market Pre-Order</h1>
    <p class="text-center text-muted mb-5">Live connection to Spring Boot API</p>

    <div class="row">
        <div class="col-md-7">
            <h4 class="mb-3">🛒 Live Marketplace</h4>
            <div id="products-list">
                <div class="spinner-border text-success" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>

        <div class="col-md-5">

            <div class="card p-4 border-top border-success border-4">
                <h4 class="mb-3">Place Pre-Order</h4>
                <form id="order-form">
                    <div class="mb-3">
                        <label class="form-label text-muted small text-uppercase">Customer ID</label>
                        <input type="number" class="form-control" id="customerId" placeholder="Enter your ID (e.g., 1)" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small text-uppercase">Product ID</label>
                        <input type="number" class="form-control" id="productId" placeholder="Enter Product ID" required>
                    </div>
                    <button type="button" class="btn btn-success w-100 fw-bold" onclick="submitOrder()">Submit Order</button>
                </form>
                <div id="order-status" class="alert mt-3 d-none small" role="alert"></div>
            </div>

            <div class="card p-4 border-top border-primary border-4 mt-4">
                <h4 class="mb-3">Track Order</h4>
                <div class="input-group mb-3">
                    <input type="number" id="trackOrderId" class="form-control" placeholder="Order ID">
                    <button class="btn btn-primary" onclick="trackOrder()">Track</button>
                </div>
                <div id="track-result" class="p-3 bg-light rounded d-none small"></div>
            </div>

        </div>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const API_BASE_URL = 'http://localhost:8081/api';

    // --- 1. LOAD PRODUCTS ---
    async function loadProducts() {
        try {
            const response = await fetch(`${API_BASE_URL}/products`);
            const products = await response.json();

            const container = document.getElementById('products-list');
            container.innerHTML = '';

            products.forEach(product => {
                const isOutOfStock = product.availableQuantity <= 0;
                const stockBadge = isOutOfStock
                    ? `<span class="badge bg-danger">Out of Stock</span>`
                    : `<span class="badge bg-success">${product.availableQuantity} left</span>`;

                // Safely check if a farmer is attached to avoid null errors
                const farmName = product.farmer ? product.farmer.farmName : "Independent Farmer";

                container.innerHTML += `
                    <div class="card ${isOutOfStock ? 'out-of-stock' : ''}">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <h5 class="card-title mb-1">${product.name} <small class="text-muted">(ID: ${product.id})</small></h5>
                                ${stockBadge}
                            </div>
                            <p class="text-muted small mb-2">👨‍🌾 Grown by: <strong>${farmName}</strong></p>
                            <p class="card-text mb-2">${product.description}</p>
                            <h5 class="text-success fw-bold mb-0">$${product.price}</h5>
                        </div>
                    </div>
                `;
            });
        } catch (error) {
            document.getElementById('products-list').innerHTML = `<p class="text-danger">Failed to connect to backend API.</p>`;
        }
    }

    // --- 2. SUBMIT ORDER ---
    async function submitOrder() {
        const customerId = document.getElementById('customerId').value;
        const productId = document.getElementById('productId').value;
        const statusBox = document.getElementById('order-status');

        try {
            const response = await fetch(`${API_BASE_URL}/orders`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    customerId: parseInt(customerId),
                    productIds: [parseInt(productId)]
                })
            });

            const data = await response.json();
            statusBox.classList.remove('d-none', 'alert-success', 'alert-danger');

            if (response.ok) {
                statusBox.classList.add('alert-success');
                statusBox.innerHTML = `<strong>Success!</strong> Order #${data.id} placed.<br>Status: ${data.status}`;
                loadProducts(); // Refresh inventory numbers!
            } else {
                statusBox.classList.add('alert-danger');
                statusBox.innerText = `Error: ${data.error || JSON.stringify(data)}`;
            }
        } catch (error) {
            statusBox.classList.remove('d-none');
            statusBox.classList.add('alert-danger');
            statusBox.innerText = "Network error. Could not connect to the server.";
        }
    }

    // --- 3. TRACK ORDER ---
    async function trackOrder() {
        const orderId = document.getElementById('trackOrderId').value;
        const resultBox = document.getElementById('track-result');

        if(!orderId) return;

        try {
            const response = await fetch(`${API_BASE_URL}/orders/${orderId}`);
            const data = await response.json();

            resultBox.classList.remove('d-none');

            if (response.ok) {
                // Formatting the date nicely
                const orderDate = new Date(data.orderDate).toLocaleString();
                resultBox.innerHTML = `
                    <strong>Status:</strong> <span class="badge bg-info text-dark">${data.status}</span><br>
                    <strong>Date:</strong> ${orderDate}<br>
                    <strong>Customer:</strong> ${data.customer.name}<br>
                    <strong>Items:</strong> ${data.products.length} product(s)
                `;
            } else {
                resultBox.innerHTML = `<span class="text-danger">Order not found.</span>`;
            }
        } catch (error) {
            resultBox.classList.remove('d-none');
            resultBox.innerHTML = `<span class="text-danger">Connection error.</span>`;
        }
    }

    // Initialize page
    window.onload = loadProducts;
</script>

</body>
</html>
