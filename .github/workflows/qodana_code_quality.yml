name: CI/CD Pipeline to AWS

# Trigger the pipeline automatically whenever code is pushed to the master branch
on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # The temporary cloud runner machine provided by GitHub

    steps:
      # 1. Download the code from your repository onto the GitHub runner
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Install Java 17 onto the GitHub runner environment
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Compile the Java files and run validation to package the executable .jar file
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Log securely into your Docker Hub account using repository secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build the Docker container image using the local Dockerfile recipe and push it to Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/farmers-market:latest

      # 6. Establish a secure SSH tunnel to your running AWS instance and restart the container
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Download the updated image from the registry
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/farmers-market:latest
            
            # Forcefully stop and remove the old API container if it's already running
            sudo docker stop farmers-api || true
            sudo docker rm farmers-api || true
            
            # Run the new container detached on port 8080
            sudo docker run -d -p 8080:8080 --name farmers-api ${{ secrets.DOCKER_USERNAME }}/farmers-market:latest