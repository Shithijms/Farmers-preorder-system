<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmers' Market Pre-Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 40px; }
        .card { margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <h1 class="text-center mb-5 text-success">🌾 Farmers' Market Pre-Order System</h1>

    <div class="row">
        <div class="col-md-6">
            <h3>Available Fresh Produce</h3>
            <div id="products-list" class="mt-3">
                <p class="text-muted">Loading products from the farm...</p>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-4">
                <h3>Place a Pre-Order</h3>
                <form id="order-form" class="mt-3">
                    <div class="mb-3">
                        <label for="customerId" class="form-label">Customer ID (Try '1')</label>
                        <input type="number" class="form-control" id="customerId" required>
                    </div>
                    <div class="mb-3">
                        <label for="productId" class="form-label">Product ID to Order</label>
                        <input type="number" class="form-control" id="productId" required>
                    </div>
                    <button type="button" class="btn btn-success w-100" onclick="submitOrder()">Submit Order</button>
                </form>

                <div id="order-status" class="alert mt-3 d-none" role="alert"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    // Change this to your AWS IP (e.g., 'http://12.34.56.78:8080/api')
    // Or leave it as localhost if you are testing the backend on your own machine.
    const API_BASE_URL = 'http://localhost:8080/api';

    // --- FETCH PRODUCTS (GET) ---
    async function loadProducts() {
        try {
            const response = await fetch(`${API_BASE_URL}/products`);
            const products = await response.json();

            const productsContainer = document.getElementById('products-list');
            productsContainer.innerHTML = ''; // Clear loading text

            products.forEach(product => {
                const productHTML = `
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">${product.name} (ID: ${product.id})</h5>
                            <p class="card-text">${product.description}</p>
                            <p class="card-text text-success fw-bold">$${product.price}</p>
                            <p class="card-text"><small class="text-muted">${product.availableQuantity} in stock</small></p>
                        </div>
                    </div>
                `;
                productsContainer.innerHTML += productHTML;
            });
        } catch (error) {
            document.getElementById('products-list').innerHTML =
                `<p class="text-danger">Failed to load products. Is the Spring Boot server running?</p>`;
        }
    }

    // --- SUBMIT ORDER (POST) ---
    async function submitOrder() {
        const customerId = document.getElementById('customerId').value;
        const productId = document.getElementById('productId').value;
        const statusBox = document.getElementById('order-status');

        // Prepare the JSON payload exactly how our Spring Boot DTO expects it
        const requestPayload = {
            customerId: parseInt(customerId),
            productIds: [parseInt(productId)]
        };

        try {
            const response = await fetch(`${API_BASE_URL}/orders`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestPayload)
            });

            const data = await response.json();

            // Handle UI feedback
            statusBox.classList.remove('d-none', 'alert-success', 'alert-danger');

            if (response.ok) {
                statusBox.classList.add('alert-success');
                statusBox.innerText = `Success! Order #${data.id} placed. Status: ${data.status}`;
            } else {
                // If our Spring Boot validation caught an error, display it
                statusBox.classList.add('alert-danger');
                statusBox.innerText = `Error: ${JSON.stringify(data)}`;
            }
        } catch (error) {
            statusBox.classList.remove('d-none');
            statusBox.classList.add('alert-danger');
            statusBox.innerText = "Network error. Could not connect to the server.";
        }
    }

    // Load products immediately when the page opens
    window.onload = loadProducts;
</script>

</body>
</html>
