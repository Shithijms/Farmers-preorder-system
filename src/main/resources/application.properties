spring.application.name=preorder-system

# Enable the H2 web console so you can view your database in the browser
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
server.port=8081
# Database connection settings
spring.datasource.url=${DB_URL:jdbc:h2:mem:farmersmarketdb}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:   }

# Tell Hibernate to automatically create/update database tables based on our Java classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
